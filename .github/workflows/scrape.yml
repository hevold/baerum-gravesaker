name: Daglig gravesaker-skraper

on:
  schedule:
    # Kjører kl. 07:00 norsk tid (05:00 UTC) hver dag
    - cron: '0 5 * * *'
  workflow_dispatch:
    # Tillat manuell kjøring fra GitHub Actions-grensesnittet

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Nødvendig for å committe og pushe data

    steps:
      - name: Sjekk ut repo
        uses: actions/checkout@v4

      - name: Sett opp Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer avhengigheter
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Kjør skraper
        id: scraper
        run: python scraper/scrape.py

      - name: Commit og push hvis det er nye data
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add docs/data/gravesaker.json
          if git diff --staged --quiet; then
            echo "Ingen nye saker i dag."
          else
            DATO=$(date +'%Y-%m-%d')
            NYE=${{ steps.scraper.outputs.new_cases || '?' }}
            git commit -m "🕳️ Oppdatering ${DATO}: ${NYE} nye Eiksmarka-saker"
            git push
            echo "✅ Data pushet til GitHub"
          fi
